services:
  db:
    image: nasco2000/wordsmith:db-latest

  words:
    build: ./words
    image: nasco2000/wordsmith:words-latest
    depends_on:
      - db

  web:
    image: nasco2000/wordsmith:web-latest
    ports:
      - "${WEB_PORT:-80}:80"
    volumes:
      - ./web/static:/static
    depends_on:
      - words