name: Build and Push Wordsmith Images

on:
  pull_request:
    types:
      - labeled

jobs:
  build-and-push:
    name: Build & Push ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - web
          - words
          - db

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build, Tag & Push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/wordsmith:${{ matrix.service }}-latest
            ${{ secrets.DOCKERHUB_USERNAME }}/wordsmith:${{ matrix.service }}-pr-${{ github.event.number }}
            ${{ secrets.DOCKERHUB_USERNAME }}/wordsmith:${{ matrix.service }}-${{ steps.vars.outputs.sha_short }}
